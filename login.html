        /* Animated Glowing Border for the Card */
        .glow-border {
            position: relative;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, transparent 40%, rgba(0, 243, 255, 0.8) 50%, transparent 60%);
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderGlow 4s linear infinite;
            z-index: -1;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        /* Button Sweep Animation */
        .btn-sweep {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            animation: sweep 3s infinite;
        }
        .btn-sweep:hover {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);

        }

        @keyframes sweep {
            0% { left: -100%; }
            20% { left: 200%; }

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let sakuras = [];

        // Colors from CSS variables
        const styles = getComputedStyle(document.documentElement);
        const nodeColor = styles.getPropertyValue('--particle-node-color').trim() || 'rgba(0, 243, 255, 0.8)';
        const sakuraColor = styles.getPropertyValue('--particle-sakura-color').trim() || 'rgba(255, 105, 180, 0.7)';
        const linkColorBase = styles.getPropertyValue('--particle-link-color').trim() || 'rgba(0, 243, 255, ';

        // Mouse interaction
        let mouse = {
            x: null,
            y: null,
            radius: 150
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);

        class TechNode {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.radius = Math.random() * 2 + 1;
                this.baseRadius = this.radius;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;

                // Mouse interaction (gravity)
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        
                        this.vx += forceDirectionX * force * 0.05;
                        this.vy += forceDirectionY * force * 0.05;

                        // Add glow when near mouse
                        this.radius = this.baseRadius + (force * 3);
                    } else {
                        this.radius = this.baseRadius;
                    }
                }

                // Apply some friction to slow down
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Keep minimum speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < 0.2) {
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = nodeColor;
                ctx.shadowBlur = 10;
                ctx.shadowColor = nodeColor;
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            }
        }

        class Sakura {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height; // start above screen
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 1.5 + 0.5; // falling speed
                this.radius = Math.random() * 3 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.x += this.vx + Math.sin(this.angle) * 1;
                this.y += this.vy;
                this.angle += this.angleSpeed;

                // Wrap around
                if (this.y > height + 10) {
                    this.y = -10;
                    this.x = Math.random() * width;
                }
                if (this.x > width + 10) this.x = -10;
                if (this.x < -10) this.x = width + 10;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = sakuraColor;
                ctx.shadowBlur = 15;
                ctx.shadowColor = sakuraColor;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            particles = [];
            sakuras = [];
            
            const numNodes = Math.floor((width * height) / 15000); // responsive count
            const numSakura = Math.floor((width * height) / 30000);

            for (let i = 0; i < numNodes; i++) {
                particles.push(new TechNode());
            }
            for (let i = 0; i < numSakura; i++) {
                sakuras.push(new Sakura());
            }
        }

        function connectNodes() {
            let opacityValue = 1;
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        opacityValue = 1 - (distance / 120);
                        ctx.strokeStyle = `rgba(0, 243, 255, ${opacityValue * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, width, height);

            connectNodes();

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            for (let i = 0; i < sakuras.length; i++) {
                sakuras[i].update();
                sakuras[i].draw();
            }
        }

        resize();
        animate();
    });
</script>
